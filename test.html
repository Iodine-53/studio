<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML2PDF Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

    <h1>Pure HTML Test</h1>
    <button onclick="generatePDF()">Generate PDF</button>

    <div id="capture-me" style="padding: 20px; border: 1px solid black; background-color: #f0f0f0; margin-top: 20px;">
        <h2>This is a test heading</h2>
        <p>This is a paragraph inside the div. If you can see this in the PDF, the library works.</p>
        <p>Here is an image:</p>
        <img src="https://placehold.co/150x150.png" alt="placeholder">
    </div>

    <script>
        function generatePDF() {
            const element = document.getElementById('capture-me');
            const options = {
                filename: 'test-document.pdf',
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };
            html2pdf().from(element).set(options).save();
        }
    </script>

</body>
</html>
